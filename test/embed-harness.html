<!doctype html>
<!--
  Embed harness — plays the role of the enterprise admin backend that frames TripDesk.
  Open this file directly in a browser (file://) to test the iframe handoff BEFORE handing
  the URL to the integrator. It builds `<base>/#uid=<uid>&token=<token>` and frames it.

  Tests, in order:
    1. Local end-to-end:  base = http://localhost:4000   (run `pnpm dev` first)
    2. Production:        base = https://tripdesk.impo.ai (needs Cloudflare Access OFF for
                          the embed, else the Access login wall renders instead of the app)

  Pass criterion: the app renders INSIDE the frame (no blank box = framing/CSP ok), and a
  flight query returns REAL flights (not an auth error) = the URL token reached the sandbox.
-->
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <title>TripDesk embed harness</title>
    <style>
      body { font: 14px/1.5 system-ui; margin: 0; background: #f3efe7; color: #2b2622; }
      header { padding: 12px 16px; background: #fff; border-bottom: 1px solid #e2d9c8; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      label { display: flex; flex-direction: column; font-size: 11px; color: #8a7d68; }
      input { font: 13px monospace; padding: 6px 8px; border: 1px solid #d8cdb8; border-radius: 6px; min-width: 220px; }
      input.wide { min-width: 420px; }
      button { padding: 8px 16px; border: 0; border-radius: 6px; background: #b6502f; color: #fff; font-weight: 600; cursor: pointer; align-self: end; }
      iframe { width: 100%; height: calc(100vh - 64px); border: 0; display: block; background: #fff; }
      code { background: #efe7d6; padding: 1px 5px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <header>
      <label>base<input id="base" class="wide" value="http://localhost:4000" /></label>
      <label>uid (员工稳定ID)<input id="uid" value="demo-emp-001" /></label>
      <label>org (所属组织)<input id="org" value="demo-org" /></label>
      <label>token (员工 travelkit token)<input id="token" class="wide" placeholder="粘贴一个真实 travelkit token" /></label>
      <label>k (embed 门禁 key)<input id="k" placeholder="EMBED_KEY" /></label>
      <button id="go">载入 iframe</button>
    </header>
    <iframe id="frame" title="TripDesk"></iframe>
    <script>
      const $ = (id) => document.getElementById(id)
      function load() {
        const base = $('base').value.replace(/\/+$/, '')
        const uid = encodeURIComponent($('uid').value)
        const org = encodeURIComponent($('org').value)
        const token = encodeURIComponent($('token').value)
        const k = encodeURIComponent($('k').value)
        const src = `${base}/#uid=${uid}&org=${org}&token=${token}&k=${k}`
        $('frame').src = src
        console.log('framing', src)
      }
      $('go').onclick = load
      // Remember the token across reloads of this harness (localStorage of the harness origin,
      // NOT of the iframe — keeps the real token out of the iframe's URL bar after handoff).
      for (const k of ['base', 'uid', 'org', 'token', 'k']) {
        const v = localStorage.getItem('eh_' + k); if (v) $(k).value = v
        $(k).oninput = () => localStorage.setItem('eh_' + k, $(k).value)
      }
    </script>
  </body>
</html>
